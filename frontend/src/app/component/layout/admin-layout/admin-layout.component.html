<mat-sidenav-container class="h-screen w-full">

  <!-- ── Sidebar ─────────────────────────────────────────────────────── -->
  <mat-sidenav
    #drawer
    [mode]="isMobile ? 'over' : 'side'"
    [opened]="!isMobile"
    [fixedInViewport]="isMobile"
    class="sidenav">

    <!-- Logo -->
    <div
      class="flex items-center gap-2.5 px-4 h-16 shrink-0 border-b border-white/[0.06]">
      <div
        class="w-9 h-9 bg-yellow-500 rounded-lg flex items-center justify-center shrink-0">
        <mat-icon
          style="color:#1b5e20;font-size:20px;width:20px;height:20px;line-height:20px">access_time</mat-icon>
      </div>
      <div class="flex flex-col overflow-hidden">
        <span
          class="text-sm font-bold text-white whitespace-nowrap tracking-wide">DTR
          System</span>
        <span class="text-[11px] text-white/[0.45] whitespace-nowrap">Daily Time
          Records</span>
      </div>
    </div>

    <!-- Navigation -->
    <nav class="flex-1 py-2.5 overflow-y-auto">
      <a
        *ngFor="let item of modules"
        [routerLink]="[item.route]"
        (click)="onNavClick()"
        class="flex items-center gap-3   ml-2.5 my-0.5 px-3 py-2.5 rounded-l-lg no-underline transition-colors duration-150 cursor-pointer"
        [ngClass]="  item.name === page_title 
          ? 'bg-white/[0.13] text-white'
          : 'text-white/[0.7] hover:bg-white/[0.07] hover:text-white/[0.9]'">
        <mat-icon
          class="shrink-0 text-xl w-5 h-5"
          [style.color]=" item.name === page_title  ? '#ffffff' : 'rgba(255,255,255,0.5)'">
          {{ item.icon }}
        </mat-icon>
        <span
          class="text-sm whitespace-nowrap"
          [ngClass]="  item.name === page_title 
          ? 'font-bold text-white':'font-medium text-white/[0.7]'">
          {{ item.label }}
        </span>
      </a>
    </nav>

    <div
      class="flex items-center gap-2.5 px-3.5 py-3 border-t border-white/[0.06] shrink-0">
      <div
        class="w-8 h-8 rounded-full bg-[#2e7d32] text-white flex items-center justify-center text-xs font-bold shrink-0 tracking-wider">

      </div>
      <div class="flex flex-col overflow-hidden flex-1 min-w-0">
        <span
          class="text-[13px] font-semibold text-white whitespace-nowrap overflow-hidden text-ellipsis">
          {{ auth.user()?.username ?? 'Admin' }}
        </span>
        <span
          class="text-[11px] text-white/[0.45] whitespace-nowrap">Administrator</span>
      </div>
      <button mat-icon-button (click)="logout()" class="logout-btn"
        matTooltip="Logout" matTooltipPosition="above">
        <mat-icon>logout</mat-icon>
      </button>
    </div>
  </mat-sidenav>

  <mat-sidenav-content class="sidenav-content">
    <header
      class="sticky top-0 z-[100] flex items-center shadow-md justify-between h-16 pl-4 pr-6 bg-white border-b border-[#c8e6c9] shrink-0">
      <div class="flex items-center  gap-4">
        <button mat-icon-button (click)="drawer.toggle()"
          class="text-[#558b5e]">
          <mat-icon>menu</mat-icon>
        </button>
        <h1
          class="m-0 text-xl font-bold text-[#1b3a1c] tracking-tight leading-none">{{page_title}}</h1>
      </div>

      <div class="flex items-center gap-1">
        <button mat-icon-button class="text-[#558b5e] hidden sm:inline-flex"
          matTooltip="Notifications">
          <mat-icon>notifications_none</mat-icon>
        </button>
        <button mat-icon-button [matMenuTriggerFor]="userMenu">
          <div
            class="w-8 h-8 rounded-full bg-[#2e7d32] text-white flex items-center justify-center text-xs font-bold tracking-wider">
            A
          </div>
        </button>
      </div>

      <mat-menu #userMenu="matMenu" xPosition="before">
        <button mat-menu-item>
          <mat-icon>person</mat-icon>
          <span>Profile</span>
        </button>
        <mat-divider></mat-divider>
        <button mat-menu-item (click)="logout()" class="logout-menu-item">
          <mat-icon>logout</mat-icon>
          <span>Logout</span>
        </button>
      </mat-menu>
    </header> 
    <div class="flex-1 overflow-y-auto p-6 max-sm:p-4 bg-[#f0f7f0]">
      <router-outlet></router-outlet>
    </div>

  </mat-sidenav-content>
</mat-sidenav-container>
