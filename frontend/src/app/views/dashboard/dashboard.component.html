<div>
  <div class="mb-6">
    <h2 class="text-2xl font-bold text-gray-800">Dashboard</h2>
    <p class="text-gray-500 text-sm mt-1">Welcome back, {{ auth.getUser()?.name }}</p>
  </div>

  <!-- Stats -->
  <div *ngIf="!loading" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-4 mb-8">
    <div *ngFor="let s of stats" class="bg-white rounded-xl shadow-sm p-5 flex items-center gap-4">
      <div class="w-12 h-12 rounded-full flex items-center justify-center flex-shrink-0" [ngClass]="s.color">
        <mat-icon class="text-white">{{ s.icon }}</mat-icon>
      </div>
      <div>
        <p class="text-2xl font-bold text-gray-800">{{ s.value }}</p>
        <p class="text-gray-500 text-sm">{{ s.label }}</p>
      </div>
    </div>
  </div>

  <!-- Quick actions -->
  <div class="bg-white rounded-xl shadow-sm p-6">
    <h3 class="text-lg font-semibold text-gray-700 mb-4">Quick Actions</h3>
    <div class="flex flex-wrap gap-3">
      <a routerLink="/admin/employees" mat-flat-button color="primary" class="flex items-center gap-2">
        <mat-icon>person_add</mat-icon> Add Employee
      </a>
      <a routerLink="/admin/dtr" mat-stroked-button color="primary" class="flex items-center gap-2">
        <mat-icon>upload_file</mat-icon> Upload DTR
      </a>
    </div>
  </div>
</div>
