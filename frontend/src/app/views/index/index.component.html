<div class="flex flex-col h-full min-h-0 overflow-hidden relative">
  <div class="py-4 shrink-0">
    <p class="font-medium text-5xl">Document List</p>
  </div>
  <div class="flex-1 min-h-0 bg-white rounded-lg shadow-sm py-4 px-6 overflow-hidden">
    <app-document-table
      class="h-full"
      [data]="documents_list"
      (signatureSaved)="handleSignatureSaved($event)"
      (deleteConfirmed)="deleted()">
    </app-document-table>
  </div>
</div>
