<div>
  <!-- Header -->
  <div class="flex items-center justify-between mb-6">
    <div class="relative  w-full md:w-96 lg:w-96  mt-2">
      <div
        class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none">
        <svg xmlns="http://www.w3.org/2000/svg"
          class="h-5 w-5 text-gray-400" fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round"
            stroke-width="2"
            d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
        </svg>
      </div>
      <input
        type="text"
        class="w-full pl-10 pr-4 py-2 border shadow-md border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
        placeholder="Search " />
    </div>
    <button  class=" pl-2 pr-4  py-1 border shadow-md border-gray-300 rounded-lg   bg-amber-500 text-white
    hover:bg-amber-600
    focus:outline-none focus:ring-1  focus:ring-yellow-500  flex items-center gap-x-2" (click)="openAdd()" >
      <mat-icon class="text-lg"  >add</mat-icon> 
      <span class="!text-white">Add</span> 
    </button>
  </div>

  
  <!-- Table -->
  <div class="bg-white rounded-xl shadow-sm overflow-hidden">
    <table mat-table [dataSource]="filtered" class="w-full">

      <ng-container matColumnDef="employee_id">
        <th mat-header-cell *matHeaderCellDef
          class="text-xs font-semibold text-gray-500 uppercase">ID</th>
        <td mat-cell *matCellDef="let e" class="text-sm text-gray-700">{{
          e.employee_id }}</td>
      </ng-container>

      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef
          class="text-xs font-semibold text-gray-500 uppercase">Name</th>
        <td mat-cell *matCellDef="let e"
          class="text-sm font-medium text-gray-800">{{ e.first_name }} {{
          e.last_name }}</td>
      </ng-container>

      <ng-container matColumnDef="position">
        <th mat-header-cell *matHeaderCellDef
          class="text-xs font-semibold text-gray-500 uppercase">Position</th>
        <td mat-cell *matCellDef="let e" class="text-sm text-gray-700">{{
          e.position }}</td>
      </ng-container>

      <ng-container matColumnDef="department">
        <th mat-header-cell *matHeaderCellDef
          class="text-xs font-semibold text-gray-500 uppercase">Department</th>
        <td mat-cell *matCellDef="let e" class="text-sm text-gray-700">{{
          e.department }}</td>
      </ng-container>

      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef
          class="text-xs font-semibold text-gray-500 uppercase">Status</th>
        <td mat-cell *matCellDef="let e">
          <span class="px-2 py-1 rounded-full text-xs font-medium"
            [class.bg-green-100]="e.status === 'active'"
            [class.text-green-700]="e.status === 'active'"
            [class.bg-gray-100]="e.status === 'inactive'"
            [class.text-gray-600]="e.status === 'inactive'">
            {{ e.status | titlecase }}
          </span>
        </td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef
          class="text-xs font-semibold text-gray-500 uppercase">Actions</th>
        <td mat-cell *matCellDef="let e">
          <button mat-icon-button color="primary" (click)="openEdit(e)"
            matTooltip="Edit">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button color="warn" (click)="deleteEmployee(e)"
            matTooltip="Delete">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="columns"></tr>
      <tr mat-row *matRowDef="let row; columns: columns;"
        class="hover:bg-gray-50 transition-colors"></tr>

      <tr class="mat-row" *matNoDataRow>
        <td class="mat-cell text-center py-8 text-gray-400"
          [attr.colspan]="columns.length">
          {{ loading ? 'Loading...' : 'No employees found.' }}
        </td>
      </tr>
    </table>
  </div>
</div>
