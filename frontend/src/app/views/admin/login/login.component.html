<div class="min-h-screen bg-gradient-to-br from-blue-900 to-blue-700 flex items-center justify-center p-4">
  <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md p-8">

    <!-- Header -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-100 rounded-full mb-4">
        <mat-icon class="text-blue-700 text-3xl">access_time</mat-icon>
      </div>
      <h1 class="text-2xl font-bold text-gray-800">DTR System</h1>
      <p class="text-gray-500 text-sm mt-1">Sign in to your account</p>
    </div>

    <!-- Error -->
    <div *ngIf="error" class="bg-red-50 border border-red-200 text-red-700 rounded-lg px-4 py-3 text-sm mb-4">
      {{ error }}
    </div>

    <!-- Form -->
    <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-4">

      <mat-form-field appearance="outline" class="w-full">
        <mat-label>Username</mat-label>
        <input matInput formControlName="username" autocomplete="username" />
        <mat-icon matSuffix class="text-gray-400">person</mat-icon>
      </mat-form-field>

      <mat-form-field appearance="outline" class="w-full">
        <mat-label>Password</mat-label>
        <input matInput [type]="hidePassword ? 'password' : 'text'" formControlName="password" autocomplete="current-password" />
        <button mat-icon-button matSuffix type="button" (click)="hidePassword = !hidePassword">
          <mat-icon class="text-gray-400">{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
        </button>
      </mat-form-field>

      <button
        mat-flat-button
        color="primary"
        type="submit"
        [disabled]="form.invalid || loading"
        class="w-full h-12 text-base font-semibold">
        {{ loading ? 'Signing in...' : 'Sign In' }}
      </button>
    </form>

    <!-- Hint for demo -->
    <div class="mt-6 p-3 bg-gray-50 rounded-lg text-xs text-gray-500">
      <p class="font-medium text-gray-600 mb-1">Demo credentials:</p>
      <p>superadmin / admin123</p>
      <p>supervisor / super123</p>
      <p>employee / emp123</p>
    </div>
  </div>
</div>
